name: LLMOps PR Evaluator — Translation Quality

on:
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  compare-performance:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # --- STEP 1: TEST BASELINE (MAIN BRANCH) ---
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-code

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install boto3

      - name: Run Evaluation on MAIN (Baseline)
        env:
          AGENT_ID: ${{ secrets.AGENT_ID }}
          AWS_REGION: us-east-1
        run: |
          cd main-code
          python scripts/evaluate.py
          mv metrics.json ../baseline_metrics.json
          echo "✅ Baseline evaluation done."

      # --- STEP 2: TEST CURRENT BRANCH (PR) ---
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          path: pr-code

      - name: Run Evaluation on PR (New Code)
        env:
          AGENT_ID: ${{ secrets.AGENT_ID }}
          AWS_REGION: us-east-1
        run: |
          cd pr-code
          python scripts/evaluate.py
          mv metrics.json ../current_metrics.json
          echo "✅ Current PR evaluation done."

      # --- STEP 3: COMPARE & COMMENT ---
      - name: Post PR Comment Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            try {
                const baseline = JSON.parse(fs.readFileSync('baseline_metrics.json', 'utf8'));
                const current = JSON.parse(fs.readFileSync('current_metrics.json', 'utf8'));

                // --- HELPERS ---
                const clean = (text) => {
                    if (!text) return "-";
                    return text.replace(/\|/g, "\\|").replace(/[\r\n]+/g, " ").trim();
                };

                const cleanTable = (text) => {
                    if (!text) return "-";
                    return text.replace(/\|/g, "\\|").replace(/[\r\n]+/g, "<br>").trim();
                };

                // --- 1. SCORECARD ---
                const scoreDiff = current.avg_judge_score - baseline.avg_judge_score;
                const qualityDiff = current.quality_percentage - baseline.quality_percentage;
                const diffAccDiff = current.difficulty_accuracy - baseline.difficulty_accuracy;

                const icon = (diff) => {
                    if (diff > 0) return '🚀 Improved';
                    if (diff < 0) return '⚠️ Degraded';
                    return '➖ No Change';
                };

                // --- 2. VALIDATION REPORT (Side-by-Side with Judge Scores) ---
                const baseResults = baseline.results;
                const currResults = current.results;

                let validationRows = "| Judge | Input | Expected | Main Translation | PR Translation | Main Score | PR Score | Reasoning |\n";
                validationRows += "| :---: | :--- | :--- | :--- | :--- | :---: | :---: | :--- |\n";

                for (let i = 0; i < currResults.length; i++) {
                    const item = currResults[i];
                    const baseItem = baseResults[i] || {};

                    // Score comparison icon
                    const scoreIcon = item.judge_score >= 4 ? "✅" : item.judge_score >= 3 ? "🟡" : "❌";

                    const inputShort = clean(item.input).substring(0, 25) + "...";
                    const expected = clean(item.expected_translation).substring(0, 30) + "...";
                    const mainTrans = clean(baseItem.actual_translation || "N/A").substring(0, 30) + "...";
                    const prTrans = clean(item.actual_translation || "N/A").substring(0, 30) + "...";
                    const mainScore = baseItem.judge_score != null ? `${baseItem.judge_score}/5` : "N/A";
                    const prScore = `${item.judge_score}/5`;
                    const reasoning = clean(item.judge_reasoning).substring(0, 50) + "...";

                    validationRows += `| ${scoreIcon} | ${inputShort} | ${expected} | ${mainTrans} | ${prTrans} | ${mainScore} | ${prScore} | ${reasoning} |\n`;
                }

                // --- 3. INFERENCE REPORT ---
                let inferenceRows = "";
                if (current.demo_results && current.demo_results.length > 0) {
                    inferenceRows = current.demo_results.map(item => {
                        const colInput = cleanTable(item.input);
                        const colTranslation = cleanTable(item.translation);
                        const colDifficulty = `**${cleanTable(item.difficulty)}**`;
                        const colAnalysis = cleanTable(item.analysis);
                        const colNotes = cleanTable(item.notes);
                        return `| ${colInput} | ${colTranslation} | ${colDifficulty} | ${colAnalysis} | ${colNotes} |`;
                    }).join("\n");
                } else {
                    inferenceRows = "| - | - | - | - | - |";
                }

                // --- 4. BUILD REPORT ---
                let body = `
                ### 🌐 LLMOps Translation Report: ${context.sha.substring(0, 7)}

                > **LLM-as-a-Judge Pattern**: Translation quality scored by Claude 3 Haiku (Judge) evaluating Claude 3 Sonnet (Translator).

                #### 📊 Scorecard
                | Metric | Main Branch | This PR | Change |
                | :--- | :---: | :---: | :---: |
                | **Avg Judge Score** | ${baseline.avg_judge_score}/5 | ${current.avg_judge_score}/5 | ${icon(scoreDiff)} |
                | **Quality %** | ${baseline.quality_percentage}% | ${current.quality_percentage}% | ${icon(qualityDiff)} |
                | **Difficulty Accuracy** | ${baseline.difficulty_accuracy}% | ${current.difficulty_accuracy}% | ${icon(diffAccDiff)} |

                ---

                #### 🧑‍⚖️ Validation Results (Judged by LLM)
                _Each translation is scored 1-5 by an independent LLM judge._

                ${validationRows}

                ---

                #### 🌏 Live Translation Showcase (Inference)
                _AI translations of new, unseen Indonesian sentences._

                | Input (Indonesian) | Translation (English) | Difficulty | Analysis | Notes |
                | :--- | :--- | :--- | :--- | :--- |
                ${inferenceRows}
                `;

                // Remove leading whitespace from each line
                body = body.replace(/^ +/gm, '');

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: body
                });

            } catch (error) {
                console.log("Error generating report:", error);
                core.setFailed("Failed to generate report.");
            }
